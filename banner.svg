<svg width="1200" height="190" xmlns="http://www.w3.org/2000/svg"
     font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#064E3B"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#34D399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="190" fill="url(#bg)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="5" height="190" fill="url(#bar)"/>

  <!-- Subtle right glow circles -->
  <circle cx="1080" cy="95" r="100" fill="#059669" opacity="0.08"/>
  <circle cx="1160" cy="40"  r="55"  fill="#059669" opacity="0.06"/>
  <circle cx="1140" cy="160" r="40"  fill="#34D399" opacity="0.06"/>

  <!-- .NET watermark -->
  <text x="1075" y="112" text-anchor="middle"
        font-size="42" font-weight="800" fill="#059669" opacity="0.25">.NET</text>

  <!-- Title -->
  <text x="55" y="85"
        font-size="50" font-weight="800" fill="#F8FAFC" letter-spacing="-1">InventoryFramework</text>

  <!-- Tagline line 1 -->
  <text x="58" y="122"
        font-size="19" font-weight="400" fill="#94A3B8">
    Server-authoritative inventory &amp; crafting backend
  </text>

  <!-- Tagline line 2 -->
  <text x="58" y="150"
        font-size="19" font-weight="400" fill="#64748B">
    Unity&#160;·&#160;Godot&#160;·&#160;Unreal Engine&#160;&#160;|&#160;&#160;Self-hosted&#160;·&#160;Free demo&#160;·&#160;$80 Pro
  </text>
</svg>
